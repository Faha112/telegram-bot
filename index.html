<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://telegram.org/js/telegram-web-app.js"></script>

<title>Munilingo</title>

<style>

body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
  background:linear-gradient(180deg,#0f0f0f,#050505);
  color:white;
}

/* GLASS CARD */

.glass{
  background:rgba(255,255,255,0.05);
  backdrop-filter:blur(20px);
  border-radius:20px;
  border:1px solid rgba(255,255,255,0.1);
}

/* HEADER */

.header{
  padding:20px;
  display:flex;
  align-items:center;
  gap:15px;
}

.avatar{
  width:55px;
  height:55px;
  border-radius:50%;
}

.name{
  font-size:18px;
  font-weight:600;
}

.sub{
  font-size:13px;
  color:#aaa;
}

/* ACTION BUTTONS */

.actions{
  display:flex;
  gap:10px;
  padding:0 15px 10px 15px;
}

.action{
  flex:1;
  padding:18px;
  text-align:center;
  font-size:22px;
  transition:0.3s;
}

.action:active{
  transform:scale(0.92);
}

/* COURSES */

.grid{
  padding:15px;
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:15px;
}

.card{
  position:relative;
  border-radius:20px;
  overflow:hidden;
  height:190px;
  transition:0.3s;
}

.card:active{
  transform:scale(0.95);
}

.card img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.card::after{
  content:"";
  position:absolute;
  inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}

.title{
  position:absolute;
  bottom:15px;
  left:15px;
  z-index:2;
  font-weight:600;
}

/* PAGE */

.page{
  display:none;
  padding:20px;
}

.page.active{
  display:block;
}

/* BUTTON */

.btn{
  margin-top:15px;
  padding:15px;
  text-align:center;
  border-radius:14px;
  background:#ffd400;
  color:black;
  font-weight:600;
}

/* BOTTOM NAV */

.nav{
  position:fixed;
  bottom:0;
  left:0;
  right:0;
  background:#0b0b0b;
  border-top:1px solid #222;
  display:flex;
  justify-content:space-around;
  padding:12px 0;
}

.nav div{
  text-align:center;
  font-size:12px;
  color:#777;
}

.nav span{
  display:block;
  font-size:22px;
}

.nav .active{
  color:#ffd400;
}

</style>
</head>

<body>

<!-- HOME PAGE -->

<div id="home" class="page active">

<div class="header">

<img id="avatar" class="avatar">

<div>
<div id="name" class="name">Загрузка...</div>
<div class="sub">Добро пожаловать</div>
</div>

</div>

<div class="actions">

<div class="action glass">💬</div>
<div class="action glass">📢</div>
<div class="action glass">⭐️</div>

</div>

<div class="grid">

<div class="card" onclick="openCourse('HSK 1')">
<img src="https://picsum.photos/400/300?1">
<div class="title">HSK 1</div>
</div>

<div class="card" onclick="openCourse('HSK 2')">
<img src="https://picsum.photos/400/300?2">
<div class="title">HSK 2</div>
</div>

<div class="card" onclick="openCourse('HSK 3')">
<img src="https://picsum.photos/400/300?3">
<div class="title">HSK 3</div>
</div>

<div class="card" onclick="openCourse('Бизнес китайский')">
<img src="https://picsum.photos/400/300?4">
<div class="title">Бизнес китайский</div>
</div>

</div>

</div>

<!-- COURSE PAGE -->

<div id="course" class="page">

<h2 id="courseTitle"></h2>

<div class="glass" style="padding:15px;margin-top:15px;">
Описание курса скоро появится
</div>

<div class="btn">Купить курс</div>

</div>

<!-- PROFILE -->

<div id="profile" class="page">

<h2>Профиль</h2>

<div class="glass" style="padding:15px;margin-top:10px;">
Имя: <span id="profileName"></span>
</div>

</div>

<!-- NAV -->

<div class="nav">

<div class="active" onclick="showPage('home')">
<span>🏠</span>Главная
</div>

<div onclick="showPage('profile')">
<span>👤</span>Профиль
</div>

</div>

<script>

const tg = window.Telegram.WebApp;
tg.expand();

const user = tg.initDataUnsafe.user || {};

document.getElementById("name").innerText =
(user.first_name  "") + " " + (user.last_name  "");

document.getElementById("profileName").innerText =
(user.first_name || "");

if(user.photo_url){
document.getElementById("avatar").src = user.photo_url;
}

/* PAGE SWITCH */
